<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAY DESIGN & BUILD | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #0a0a0c;
            --text-light: #f5f5f7;
            --text-muted: #888890;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevents scrollbars from the moving grid */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Interactive Architectural Blueprint Background */
        .bg-grid {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vh;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        /* Branding */
        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: 0.15em;
            margin: 0;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .brand-sub {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            color: var(--primary-gold);
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 3rem;
        }

        /* Main Headline */
        h1 {
            font-weight: 300;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            line-height: 1.4;
            margin-bottom: 2rem;
        }

        /* Typing Effect Area */
        .typing-container {
            height: 40px;
            margin-bottom: 3rem;
        }

        .typed-text {
            color: var(--primary-gold);
            font-weight: 600;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: var(--primary-gold);
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        /* Notify Me Section */
        .notify-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        input[type="email"] {
            padding: 12px 20px;
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus {
            border-color: var(--primary-gold);
        }

        button {
            padding: 12px 30px;
            background: var(--primary-gold);
            color: var(--bg-dark);
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: #dabc7a;
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .fade-in {
            animation: fadeIn 2s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-grid" id="grid"></div>

    <div class="container fade-in">
        <h2 class="brand-name">Ray Design & Build</h2>
        <div class="brand-sub">by Archduo</div>
        
        <h1>Forging the future of spaces.<br>We specialize in</h1>
        
        <div class="typing-container">
            <h1><span class="typed-text"></span><span class="cursor">&nbsp;</span></h1>
        </div>

        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">
            Our new digital experience is currently under construction. Leave your email to be notified upon launch.
        </p>

        <div class="notify-box">
            <input type="email" placeholder="Enter your email address">
            <button onclick="alert('Thank you for your interest! We will keep you updated.')">Notify Me</button>
        </div>
    </div>

    <script>
        // --- Interactive Blueprint Grid (Mouse move effect) ---
        document.addEventListener('mousemove', function(e) {
            const grid = document.getElementById('grid');
            const x = (e.clientX / window.innerWidth - 0.5) * 40; 
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            // Moves the grid slightly in the opposite direction of the mouse
            grid.style.transform = `translate(calc(-50% - ${x}px), calc(-50% - ${y}px))`;
        });

        // --- Typing Effect for Services ---
        const textArray = ["Architecture.", "Interior Design.", "Impeccable Execution."];
        const typingDelay = 100;
        const erasingDelay = 50;
        const newTextDelay = 2000;
        let textArrayIndex = 0;
        let charIndex = 0;

        const typedTextSpan = document.querySelector(".typed-text");

        function type() {
            if (charIndex < textArray[textArrayIndex].length) {
                typedTextSpan.textContent += textArray[textArrayIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, typingDelay);
            } else {
                setTimeout(erase, newTextDelay);
            }
        }

        function erase() {
            if (charIndex > 0) {
                typedTextSpan.textContent = textArray[textArrayIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, erasingDelay);
            } else {
                textArrayIndex++;
                if (textArrayIndex >= textArray.length) textArrayIndex = 0;
                setTimeout(type, typingDelay + 1100);
            }
        }

        document.addEventListener("DOMContentLoaded", function() { 
            setTimeout(type, 1000);
        });
    </script>
</body>
</html>
