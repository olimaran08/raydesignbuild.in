<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAY DESIGN & BUILD | ARCHDUO</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --grid-opacity: 0.15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            background-color: var(--dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* Hide default cursor */
        }

        /* The Main Architectural Grid */
        .grid-container {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--gold) 1px, transparent 1px),
                linear-gradient(90deg, var(--gold) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: var(--grid-opacity);
            z-index: 1;
        }

        /* Moving Laser Line (Scanner) */
        .scanner-line {
            position: fixed;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: 0 0 15px var(--gold);
            z-index: 2;
            top: 0;
            animation: scan 8s linear infinite;
            opacity: 0.5;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* Interactive Reveal Background (The Building) */
        .building-reveal {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            z-index: 0;
            filter: grayscale(100%) brightness(30%);
            clip-path: circle(150px at -20% -20%);
            transition: clip-path 0.1s ease-out;
        }

        /* Typography & Layout */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none; /* Let mouse pass through to background */
        }

        .top-label {
            font-size: 10px;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            line-height: 0.85;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 100;
            color: rgba(255,255,255,0.6);
            margin-top: 20px;
        }

        .coming-soon {
            margin-top: 60px;
            font-size: 12px;
            letter-spacing: 4px;
            border-top: 1px solid var(--gold);
            padding-top: 20px;
            color: var(--gold);
        }

        /* CUSTOM CURSOR & COORDINATES */
        #cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #cursor::after {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
        }

        .coords {
            position: fixed;
            font-size: 9px;
            color: var(--gold);
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            margin-left: 50px;
            margin-top: 30px;
            letter-spacing: 1px;
        }

        /* Button - Needs pointer events back */
        .btn-wrap {
            pointer-events: all;
            margin-top: 40px;
        }

        .contact-btn {
            color: white;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 3px;
            padding: 15px 30px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.4s;
            text-transform: uppercase;
        }

        .contact-btn:hover {
            border-color: var(--gold);
            background: var(--gold);
            color: black;
        }

        /* Technical Border Labels */
        .border-tag {
            position: fixed;
            font-size: 9px;
            color: var(--gold);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 5;
        }
        .tag-tl { top: 30px; left: 30px; }
        .tag-tr { top: 30px; right: 30px; }
        .tag-bl { bottom: 30px; left: 30px; }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="coords" class="coords">X: 000 Y: 000</div>

    <div class="grid-container"></div>
    <div class="scanner-line"></div>
    <div class="building-reveal" id="reveal"></div>

    <div class="border-tag tag-tl">Scale 1:50</div>
    <div class="border-tag tag-tr">Studio v.01</div>
    <div class="border-tag tag-bl">Ray Design & Build ©2024</div>

    <main>
        <div class="top-label">Architecture • Interior • Execution</div>
        <h1 class="main-title">
            RAY <br> DESIGN & BUILD
        </h1>
        <div class="sub-title">by ARCHDUO</div>
        
        <div class="coming-soon">NEW DIGITAL EXPERIENCE COMING SOON</div>

        <div class="btn-wrap">
            <a href="mailto:info@raydesignbuild.in" class="contact-btn">Project Inquiry</a>
        </div>
    </main>

    <script>
        const reveal = document.getElementById('reveal');
        const cursor = document.getElementById('cursor');
        const coords = document.getElementById('coords');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // 1. Reveal building on mouse move
            reveal.style.clipPath = `circle(180px at ${x}px ${y}px)`;
            
            // 2. Move custom cursor
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
            
            // 3. Update coordinates text
            coords.style.left = x + 'px';
            coords.style.top = y + 'px';
            coords.innerText = `X: ${x.toString().padStart(3, '0')} Y: ${y.toString().padStart(3, '0')}`;
        });

        // Click effect
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    </script>
</body>
</html>
