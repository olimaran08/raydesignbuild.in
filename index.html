<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ray Design & Build | Arch Duo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at 70% 20%, rgba(200,169,106,0.15), #0a0a0a 40%);
    color: white;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* cinematic fade */
.container {
    text-align: center;
    max-width: 750px;
    padding: 20px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.2s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.brand {
    font-size: 12px;
    letter-spacing: 5px;
    color: #888;
    margin-bottom: 30px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 600;
    line-height: 1.2;
}

/* subtle gold glow line */
.line {
    width: 100px;
    height: 2px;
    margin: 30px auto;
    background: linear-gradient(to right, transparent, #c8a96a, transparent);
    box-shadow: 0 0 12px rgba(200,169,106,0.5);
}

.tagline {
    font-size: 18px;
    color: #dcdcdc;
    margin-bottom: 40px;
}

.coming {
    font-size: 13px;
    letter-spacing: 4px;
    color: #777;
    margin-bottom: 25px;
}

/* premium button instead of plain link */
.insta {
    display: inline-block;
    padding: 10px 22px;
    border: 1px solid rgba(200,169,106,0.5);
    color: #c8a96a;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.3s ease;
}

.insta:hover {
    background: #c8a96a;
    color: black;
}

.footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    color: #555;
}

</style>
</head>

<body>

<div class="container">

    <div class="brand">ARCH DUO</div>

    <h1>
        Ray Design & Build <br>
        by Arch Duo
    </h1>

    <div class="line"></div>

    <div class="tagline">
        Designing Spaces. Building Experiences.
    </div>

    <div class="coming">COMING SOON</div>

    <a href="#" class="insta">Instagram</a>

</div>

<div class="footer">
    © 2026 Arch Duo. All Rights Reserved.
</div>

</body>
</html>
