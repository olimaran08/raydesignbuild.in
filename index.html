<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ray Design & Build | Arch Duo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: white;
}

/* CINEMATIC BACKGROUND IMAGE */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
    filter: brightness(0.25);
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 70% 30%, rgba(200,169,106,0.15), rgba(0,0,0,0.9));
}

/* CONTENT */
.container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    animation: fade 1.5s ease forwards;
    opacity: 0;
}

@keyframes fade {
    to { opacity: 1; }
}

.brand {
    letter-spacing: 6px;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 30px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    line-height: 1.2;
    max-width: 800px;
}

/* GOLD LIGHT BAR */
.line {
    width: 120px;
    height: 2px;
    margin: 30px 0;
    background: linear-gradient(to right, transparent, #c8a96a, transparent);
    box-shadow: 0 0 20px rgba(200,169,106,0.6);
}

/* TAGLINE */
.tagline {
    font-size: 18px;
    color: #ddd;
    margin-bottom: 40px;
}

/* COMING */
.coming {
    font-size: 13px;
    letter-spacing: 4px;
    color: #777;
    margin-bottom: 25px;
}

/* BUTTON */
.btn {
    padding: 12px 28px;
    border: 1px solid rgba(200,169,106,0.5);
    color: #c8a96a;
    text-decoration: none;
    font-size: 13px;
    transition: 0.3s;
}

.btn:hover {
    background: #c8a96a;
    color: black;
}

/* FOOTER */
.footer {
    position: absolute;
    bottom: 20px;
    font-size: 12px;
    color: #555;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

    <div class="brand">ARCH DUO</div>

    <h1>
        Ray Design & Build <br>
        by Arch Duo
    </h1>

    <div class="line"></div>

    <div class="tagline">
        Architecture. Interiors. Execution.
    </div>

    <div class="coming">LAUNCHING SOON</div>

    <a href="#" class="btn">Instagram</a>

</div>

<div class="footer">
    © 2026 Arch Duo. All Rights Reserved.
</div>

</body>
</html>
